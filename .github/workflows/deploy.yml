name: Deploy RSS AI Daily

on:
  push:
    branches: [ main ]
  schedule:
    # 每天北京时间早上 8 点自动更新 (UTC 0 点)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ============================================
      # 阶段 1: 抓取 RSS（调试后取消注释）
      # ============================================
      # - name: Fetch RSS feeds
      #   run: npm run fetch
      #   env:
      #     # 如需代理可在此配置
      #     HTTP_PROXY: ${{ secrets.HTTP_PROXY }}

      # ============================================
      # 阶段 2: AI 摘要（调试后取消注释）
      # ============================================
      # - name: Generate AI summaries
      #   run: npm run summarize
      #   env:
      #     # 选择一种 LLM 提供商：
      #     # Option 1: OpenAI
      #     OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      #     # Option 2: 本地 Ollama（需要自托管 runner）
      #     # OLLAMA_HOST: http://localhost:11434

      # ============================================
      # 阶段 3: 生成 HTML（框架模式使用模拟数据）
      # ============================================
      - name: Generate HTML
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
