name: Deploy RSS AI Daily

on:
  push:
    branches: [ main ]
  schedule:
    # 每天北京时间早上 8 点自动更新 (UTC 0 点)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ============================================
      # 阶段 1: 抓取 RSS（框架模式生成模拟数据）
      # ============================================
      - name: Fetch RSS feeds
        run: npm run fetch

      # ============================================
      # 阶段 2: AI 摘要（框架模式生成模拟摘要）
      # ============================================
      - name: Generate AI summaries
        run: npm run summarize

      # ============================================
      # 阶段 3: 生成 HTML
      # ============================================
      - name: Generate HTML
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
